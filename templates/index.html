<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Option Pricer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-gray-50 text-gray-800 font-sans pb-20">

    <nav class="bg-slate-900 text-white shadow-md">
        <div class="max-w-4xl mx-auto px-4">
            <div class="flex justify-between items-center h-16">
                <div class="flex items-center space-x-2">
                    <svg class="w-6 h-6 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"></path>
                    </svg>
                    <span class="font-bold text-xl tracking-tight">OptionPricer</span>
                </div>
                <div class="flex space-x-2">
                    <a href="/" class="bg-slate-800 hover:bg-slate-700 px-4 py-2 rounded-md text-sm font-medium transition-colors">Calculator</a>
                    <a href="/history" class="text-gray-300 hover:bg-slate-700 hover:text-white px-4 py-2 rounded-md text-sm font-medium transition-colors">History</a>
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto mt-10 p-6 bg-white rounded-xl shadow-sm border border-gray-100">
        <h2 class="text-2xl font-bold mb-6 text-gray-800">Options Pricer <span class="text-sm font-normal text-gray-500 ml-2">(Black-Scholes & Monte Carlo)</span></h2>
        
        <form id="pricerForm" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Stock Symbol (e.g., AAPL):</label>
                <input type="text" id="symbol" value="AAPL" required 
                       class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-shadow">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Strike Price (K):</label>
                <input type="number" step="0.01" id="strikePrice" value="150" required 
                       class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-shadow">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Days to Expiration:</label>
                <input type="number" id="days" value="30" required 
                       class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-shadow">
            </div>
            <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-md transition-colors shadow-sm mt-4">
                Calculate Option Premium
            </button>
        </form>

        <div id="loading" class="hidden mt-6 text-center text-gray-500 italic">
            <svg class="animate-spin h-5 w-5 mr-3 inline-block text-blue-600" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
            </svg>
            Calculating 10,000 futures...
        </div>

        <div id="resultsBox" class="hidden mt-8 bg-slate-50 p-6 rounded-lg border border-slate-200 shadow-inner">
            <h3 id="resSymbol" class="text-xl font-bold text-slate-800 mb-4 border-b border-slate-200 pb-2"></h3>
            
            <div class="grid grid-cols-2 gap-4 mb-6">
                <div class="bg-white p-3 rounded shadow-sm border border-slate-100">
                    <p class="text-sm text-gray-500">Current Price (S)</p>
                    <p class="text-lg font-semibold text-gray-800">$<span id="resSpot"></span></p>
                </div>
                <div class="bg-white p-3 rounded shadow-sm border border-slate-100">
                    <p class="text-sm text-gray-500">Hist. Volatility (σ)</p>
                    <p class="text-lg font-semibold text-gray-800"><span id="resVol"></span>%</p>
                </div>
                <div class="bg-white p-3 rounded shadow-sm border border-slate-100 border-l-4 border-l-blue-500">
                    <p class="text-sm text-gray-500">Theoretical Price (BS)</p>
                    <p class="text-lg font-bold text-blue-600">$<span id="resBS"></span></p>
                </div>
                <div class="bg-white p-3 rounded shadow-sm border border-slate-100 border-l-4 border-l-green-500">
                    <p class="text-sm text-gray-500">Simulated Price (MC)</p>
                    <p class="text-lg font-bold text-green-600">$<span id="resMC"></span></p>
                </div>
            </div>
            
            <div class="bg-white p-4 rounded shadow-sm border border-slate-100">
                <canvas id="mcChart" width="800" height="400"></canvas>
            </div>
        </div>
    </main>

    <script>
        let myChart = null; 

        document.getElementById('pricerForm').addEventListener('submit', async function(event) {
            event.preventDefault();

            // Tailwind nutzt 'hidden' und 'block' statt style.display
            document.getElementById('loading').classList.remove('hidden');
            document.getElementById('resultsBox').classList.add('hidden');

            const requestData = {
                symbol: document.getElementById('symbol').value,
                strikePrice: parseFloat(document.getElementById('strikePrice').value),
                days: parseInt(document.getElementById('days').value)
            };

            try {
                const response = await fetch('/', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(requestData)
                });

                if (!response.ok) {
                    const errorData = await response.json();
                    throw new Error(errorData.detail || "Unknown Server Error");
                }

                const data = await response.json();

                document.getElementById('resSymbol').innerText = `Results for ${data.symbol}`;
                document.getElementById('resSpot').innerText = data.spotPrice;
                document.getElementById('resVol').innerText = data.volatility;
                document.getElementById('resBS').innerText = data.bsPrice;
                document.getElementById('resMC').innerText = data.mcPrice;

                drawChart(data.chartData, data.days);

                // Lade-Spinner verstecken, Ergebnisse zeigen
                document.getElementById('loading').classList.add('hidden');
                document.getElementById('resultsBox').classList.remove('hidden');

            } catch (error) {
                alert("⚠️ Error: " + error.message);
                console.error(error);
                document.getElementById('loading').classList.add('hidden');
            }
        });

        function drawChart(chartData, days) {
            const ctx = document.getElementById('mcChart').getContext('2d');
            if (myChart !== null) {
                myChart.destroy();
            }

            const labels = Array.from({length: days}, (_, i) => `Day ${i+1}`);
            const datasets = chartData.map((path, index) => ({
                label: `Path ${index + 1}`,
                data: path,
                borderColor: 'rgba(59, 130, 246, 0.15)', // Tailwind Blue-500 mit Transparenz
                borderWidth: 1,
                pointRadius: 0
            }));

            myChart = new Chart(ctx, {
                type: 'line',
                data: { labels: labels, datasets: datasets },
                options: {
                    plugins: { legend: { display: false } },
                    scales: { 
                        y: { 
                            title: { display: true, text: 'Stock Price ($)' },
                            grid: { color: '#f1f5f9' } // Leichtes Tailwind-Grau für das Gitter
                        },
                        x: {
                            grid: { display: false }
                        }
                    }
                }
            });
        }
    </script>
</body>
</html>
